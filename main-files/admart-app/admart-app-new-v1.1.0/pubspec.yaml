name: admart
description: admart

publish_to: "none"

version: 1.1.0+1

environment:
  sdk: ">=3.10.1 <4.0.0"
  flutter: "3.38.3"

dependencies:
  flutter:
    sdk: flutter

  get: ^4.7.3
  flutter_screenutil: ^5.9.3
  google_fonts: ^6.3.3
  get_storage: ^2.1.1
  logger: ^2.6.2
  pin_code_fields: ^8.0.1
  intl: 0.20.2
  image_picker: ^1.2.1
  flutter_svg: ^2.2.3
  flutter_animate: ^4.5.2
  connectivity_plus: ^7.0.0
  flutter_inappwebview: ^6.1.5
  r_dotted_line_border: ^0.1.1
  carousel_slider: ^5.1.1
  loading_animation_widget: ^1.3.0
  iconsax: ^0.0.8
  flip_card: ^0.7.0
  permission_handler: ^12.0.1
  cached_network_image: ^3.4.1
  dropdown_button2: ^2.3.9
  restart_app: ^1.3.2
  # custom_date_range_picker:
  path_provider: ^2.1.5
  open_file: ^3.5.10
  dots_indicator: ^4.0.1
  shimmer: ^3.0.0
  flutter_html: ^3.0.0
  phone_form_field: ^10.0.15
  lottie: ^3.3.2
  sqflite: ^2.4.2
  dynamic_languages:
    git:
      url: https://github.com/appdevsx/dynamic_languages
      ref: main
  google_sign_in: ^6.2.2
  path: ^1.9.1


dev_dependencies:
  flutter_test:
    sdk: flutter
  # dart_code_metrics: any
  change_app_package_name: ^1.4.0
  flutter_launcher_icons: ^0.14.1
  rename_app: ^1.6.1

flutter_icons:
  android: "launcher_icon"
  ios: false
  image_path: "assets/logo/app_launcher.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
    - assets/logo/
    - assets/animation/
  fonts:
    - family: Technor
      fonts:
        - asset: assets\fonts\technor.otf